<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <!-- font-preload-patched -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"></noscript>
<script src="js/theme-init.js"></script>
<!-- zm-critical-loader-css -->
  <!-- CRITICAL: Inline loader CSS — prevents black-screen if external CSS is slow -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Shop — ZenMarket</title>
  <meta name="description" content="Browse all products at ZenMarket. Filter by category, price, and more.">
  <link rel="canonical" href="https://zenmarket.lk/shop.html">
  <meta property="og:title" content="Shop — ZenMarket">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0d0f14">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" crossorigin="anonymous" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"></noscript>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/loader.css">
  <link rel="stylesheet" href="css/pages/shop.css">
</head>

<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div id="page-loader">
    <div class="loader-logo">ZenMarket</div>
    <div class="loader-dots"><span></span><span></span><span></span></div>
  </div>
  <div id="page-progress"></div>
  <div id="toast-container"></div>

  <main id="main" class="page-enter">
    <div class="page-header">
      <div class="container">
        <div class="breadcrumb" style="margin-bottom:.75rem">
          <a href="index.html">Home</a>
          <span class="breadcrumb-sep"><i class="fa-solid fa-chevron-right" style="font-size:.625rem"></i></span>
          <span class="current" id="breadcrumb-current">Shop</span>
        </div>
        <h1 id="page-title">Shop</h1>
        <p id="page-desc" style="color:var(--clr-text-2)">Discover our curated collection of premium products</p>
      </div>
    </div>

    <div class="container section-sm">
      <!-- Mobile filter toggle -->
      <button class="btn btn-ghost mobile-filter-toggle" id="mobile-filter-btn" style="margin-bottom:1rem">
        <i class="fa-solid fa-sliders"></i> Filters
      </button>
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <div class="shop-layout">
        <!-- Sidebar Filters -->
        <aside class="shop-sidebar" id="shop-sidebar">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
            <h3 style="font-size:1rem">Filters</h3>
            <button id="clear-filters" class="btn btn-ghost btn-sm">Clear All</button>
          </div>

          <div class="sidebar-title">Categories</div>
          <div id="cat-filter-list">
            <label class="checkbox-group" style="margin-bottom:.5rem">
              <input type="radio" name="cat" value=""> <span>All Categories</span>
            </label>
          </div>

          <div class="sidebar-title" id="subcat-section-label" style="display:none">Subcategories</div>
          <div id="subcat-filter-list" class="subcat-pills" style="display:none"></div>

          <div class="sidebar-title">Condition</div>
          <label class="checkbox-group" style="margin-bottom:.5rem">
            <input type="radio" name="condition" value=""> <span>All Items</span>
          </label>
          <label class="checkbox-group" style="margin-bottom:.5rem">
            <input type="radio" name="condition" value="new"> <span>New</span>
          </label>
          <label class="checkbox-group" style="margin-bottom:.5rem">
            <input type="radio" name="condition" value="used"> <span>Second Hand / Used</span>
          </label>

          <div class="sidebar-title">Price Range</div>
          <div style="padding:.5rem 0">
            <div
              style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--clr-text-3);margin-bottom:.5rem">
              <span>Rs. <span id="price-min-label">0</span></span>
              <span>Rs. <span id="price-max-label">50,000</span></span>
            </div>
            <input type="range" id="price-max" min="0" max="50000" step="500" value="50000">
          </div>

          <div class="sidebar-title">In Stock Only</div>
          <label class="checkbox-group">
            <input type="checkbox" id="filter-instock"> <span>Show in-stock only</span>
          </label>

          <div class="sidebar-title" style="margin-top:1rem">Tags</div>
          <div id="tag-filter-list" style="display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.25rem"></div>
        </aside>

        <!-- Products Area -->
        <div>
          <div class="shop-toolbar">
            <span class="shop-results" id="results-count">Loading…</span>
            <div class="shop-toolbar-right">
              <div class="search-bar" style="width:220px">
                <input type="text" id="shop-search" placeholder="Search products…">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
              </div>
              <select class="form-control" id="sort-select" style="width:auto">
                <option value="featured">Featured</option>
                <option value="newest">Newest</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="name-asc">Name A–Z</option>
                <option value="rating">Top Rated</option>
              </select>
            </div>
          </div>

          <!-- Active filters -->
          <div id="active-filters" class="active-filters"></div>

          <!-- Products grid -->
          <div class="products-grid" id="products-grid">
            <!-- Skeleton placeholders -->
            <div class="skeleton" style="height:340px;border-radius:8px"></div>
            <div class="skeleton" style="height:340px;border-radius:8px"></div>
            <div class="skeleton" style="height:340px;border-radius:8px"></div>
            <div class="skeleton" style="height:340px;border-radius:8px"></div>
            <div class="skeleton" style="height:340px;border-radius:8px"></div>
            <div class="skeleton" style="height:340px;border-radius:8px"></div>
          </div>

          <!-- Empty state -->
          <div id="shop-empty" class="empty-state" style="display:none">
            <i class="fa-solid fa-magnifying-glass"></i>
            <h3>No products found</h3>
            <p>Try adjusting your filters or search term.</p>
            <button class="btn btn-outline" id="reset-shop">Reset Filters</button>
          </div>

          <!-- Load more -->
          <div style="text-align:center;margin-top:2.5rem">
            <button id="load-more-btn" class="btn btn-outline" style="display:none">
              <i class="fa-solid fa-plus"></i> Load More Products
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

<script type="module" src="js/shop.js"></script>
</body>

</html>
