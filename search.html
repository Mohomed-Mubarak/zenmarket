<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- font-preload-patched -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"></noscript>
<script src="js/theme-init.js"></script>
<!-- zm-critical-loader-css -->
  <!-- CRITICAL: Inline loader CSS — prevents black-screen if external CSS is slow -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Search — ZenMarket</title>
  <meta name="theme-color" content="#0d0f14">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" crossorigin="anonymous" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"></noscript>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/loader.css">
  <link rel="stylesheet" href="css/pages/search.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div id="page-loader"><div class="loader-logo">ZenMarket</div><div class="loader-dots"><span></span><span></span><span></span></div></div>
  <div id="page-progress"></div>
  <div id="toast-container"></div>

  <main id="main" class="page-enter">
    <div class="page-header">
      <div class="container">
        <h1 id="search-heading">Search Results</h1>
        <!-- Search bar -->
        <div class="search-bar" style="max-width:560px;margin-top:1.25rem">
          <input type="text" id="main-search" placeholder="Search products, categories…" autocomplete="off">
          <button id="search-submit"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
      </div>
    </div>

    <div class="container section-sm">
      <div id="search-results-grid" class="products-grid">
        <div class="skeleton" style="height:340px;border-radius:8px"></div>
        <div class="skeleton" style="height:340px;border-radius:8px"></div>
        <div class="skeleton" style="height:340px;border-radius:8px"></div>
      </div>
      <div id="search-empty" class="empty-state" style="display:none">
        <i class="fa-solid fa-magnifying-glass"></i>
        <h3 id="empty-heading">No results found</h3>
        <p>Try a different keyword or browse our categories.</p>
        <a href="shop.html" class="btn btn-primary">Browse All Products</a>
      </div>
    </div>
  </main>

<script type="module" src="js/search-page.js"></script>
</body>
</html>
