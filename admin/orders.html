<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- font-preload-patched -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"></noscript>
<script src="../js/theme-init.js"></script>
<style>
#page-loader{position:fixed;inset:0;background:#0d0f14;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;transition:opacity .3s,visibility .3s;animation:_ldrTimeout 0s 3s forwards}
[data-theme="light"] #page-loader{background:#f4f5f9}
[data-theme="warm"] #page-loader{background:#0f0c07}
@keyframes _ldrTimeout{to{opacity:0;visibility:hidden;pointer-events:none}}
#page-loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader-logo{font-family:Georgia,serif;font-size:1.75rem;color:#c9a84c;letter-spacing:.05em}
.loader-dots{display:flex;gap:.5rem}
.loader-dots span{width:8px;height:8px;border-radius:50%;background:#a07a30;animation:_ldrDot 1.2s ease infinite}
.loader-dots span:nth-child(2){animation-delay:.2s}
.loader-dots span:nth-child(3){animation-delay:.4s}
@keyframes _ldrDot{0%,100%{opacity:.3}50%{opacity:1}}
#page-progress{position:fixed;top:0;left:0;height:2px;background:#c9a84c;z-index:10000;width:0;transition:width .3s ease}
#page-progress.active{animation:_ldrProgress 1.5s ease-out forwards}
@keyframes _ldrProgress{0%{width:0}70%{width:85%}100%{width:95%}}
#page-progress.done{width:100%!important}
</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Orders — ZenMarket Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0d0f14">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" crossorigin="anonymous" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"></noscript>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/loader.css">
  <link rel="stylesheet" href="../css/pages/admin-orders.css">
</head>
<body>
  <div id="page-loader"><div class="loader-logo">ZenMarket</div><div class="loader-dots"><span></span><span></span><span></span></div></div>
  <div id="page-progress"></div>
  <div id="toast-container"></div>

  <div class="admin-toolbar">
    <div class="admin-toolbar-left">
      <div class="search-bar" style="width:260px">
        <input type="text" id="order-search" placeholder="Search order ID, customer…">
        <button><i class="fa-solid fa-magnifying-glass"></i></button>
      </div>
      <select class="form-control" id="filter-status" style="width:160px">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="processing">Processing</option>
        <option value="shipped">Shipped</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <select class="form-control" id="filter-payment" style="width:160px">
        <option value="">All Payments</option>
        <option value="paid">Paid</option>
        <option value="pending">Pending</option>
        <option value="failed">Failed</option>
      </select>
    </div>
    <div class="admin-toolbar-right">
      <select class="form-control" id="sort-orders" style="width:160px">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="amount-h">Amount: High–Low</option>
        <option value="amount-l">Amount: Low–High</option>
      </select>
    </div>
  </div>

  <div class="admin-table-wrap">
    <div class="admin-table-header">
      <div style="display:flex;align-items:center;gap:.75rem">
        <span id="orders-count" style="font-size:.875rem;color:var(--clr-text-3)">Loading…</span>
        <button id="bulk-delete-btn" class="btn btn-danger btn-sm" style="display:none">
          <i class="fa-solid fa-trash"></i> Delete Selected (<span id="selected-count">0</span>)
        </button>
      </div>
    </div>
    <div class="table-wrap table-responsive">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:36px">
              <input type="checkbox" id="select-all-orders" style="accent-color:var(--clr-gold);width:14px;height:14px;cursor:pointer">
            </th>
            <th>Order ID</th>
            <th>Customer</th>
            <th class="hide-mobile">Items</th>
            <th>Total</th>
            <th>Status</th>
            <th class="hide-mobile">Payment</th>
            <th class="hide-mobile">Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="orders-tbody">
          <tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--clr-text-3)">Loading…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="admin-table-footer">
      <div id="orders-pagination" class="pagination"></div>
    </div>
  </div>

<script type="module" src="../js/admin/admin-orders.js"></script>
</body>
</html>
