<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <!-- font-preload-patched -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"></noscript>
<script src="../js/theme-init.js"></script>
<style>
#page-loader{position:fixed;inset:0;background:#0d0f14;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;transition:opacity .3s,visibility .3s;animation:_ldrTimeout 0s 3s forwards}
[data-theme="light"] #page-loader{background:#f4f5f9}
[data-theme="warm"] #page-loader{background:#0f0c07}
@keyframes _ldrTimeout{to{opacity:0;visibility:hidden;pointer-events:none}}
#page-loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader-logo{font-family:Georgia,serif;font-size:1.75rem;color:#c9a84c;letter-spacing:.05em}
.loader-dots{display:flex;gap:.5rem}
.loader-dots span{width:8px;height:8px;border-radius:50%;background:#a07a30;animation:_ldrDot 1.2s ease infinite}
.loader-dots span:nth-child(2){animation-delay:.2s}
.loader-dots span:nth-child(3){animation-delay:.4s}
@keyframes _ldrDot{0%,100%{opacity:.3}50%{opacity:1}}
#page-progress{position:fixed;top:0;left:0;height:2px;background:#c9a84c;z-index:10000;width:0;transition:width .3s ease}
#page-progress.active{animation:_ldrProgress 1.5s ease-out forwards}
@keyframes _ldrProgress{0%{width:0}70%{width:85%}100%{width:95%}}
#page-progress.done{width:100%!important}
</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Edit Post — ZenMarket Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0d0f14">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" crossorigin="anonymous" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"></noscript>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/loader.css">
  <link rel="stylesheet" href="../css/pages/admin-blog-edit.css">
</head>

<body>
  <div id="page-loader">
    <div class="loader-logo">ZenMarket</div>
    <div class="loader-dots"><span></span><span></span><span></span></div>
  </div>
  <div id="page-progress"></div>
  <div id="toast-container"></div>
  <input type="file" id="cover-file-input" accept="image/*" style="display:none">

  <form id="blog-post-form" novalidate>
    <!-- Editor Header -->
    <div class="editor-header">
      <div class="editor-header-left">
        <a href="blog.html" class="btn btn-ghost btn-sm" title="Back to posts">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h2 id="page-heading" style="font-size:1.0625rem;font-weight:600">New Post</h2>
        <span id="dirty-dot"></span>
      </div>
      <div class="editor-header-actions">
        <span id="autosave-indicator"><i class="fa-solid fa-cloud-arrow-up"
            style="margin-right:.25rem"></i>Auto-saved</span>
        <button type="button" id="save-draft-btn" class="btn btn-ghost btn-sm">
          <i class="fa-regular fa-floppy-disk"></i> Save Draft
        </button>
        <button type="button" id="publish-btn" class="btn btn-primary btn-sm">
          <i class="fa-solid fa-globe"></i> Publish
        </button>
      </div>
    </div>

    <!-- Title -->
    <div style="margin-bottom:var(--sp-5)">
      <input type="text" id="post-title" class="form-control" placeholder="Post title…"
        style="font-size:1.625rem;font-family:var(--ff-display);font-weight:600;padding:var(--sp-4) var(--sp-5);height:auto;border-radius:var(--r-lg)"
        required>
    </div>

    <div class="blog-editor-layout">
      <!-- ── Main column ── -->
      <div>
        <!-- Rich Editor -->
        <div class="rich-editor-wrap">
          <!-- Toolbar -->
          <div class="rich-toolbar" role="toolbar" aria-label="Formatting toolbar">
            <!-- Headings -->
            <div class="rich-toolbar-group">
              <select class="tb-select" onchange="document.execCommand('formatBlock',false,this.value);this.value=''"
                title="Heading">
                <option value="">Paragraph</option>
                <option value="h2">Heading 2</option>
                <option value="h3">Heading 3</option>
                <option value="h4">Heading 4</option>
                <option value="blockquote">Quote</option>
                <option value="pre">Code Block</option>
              </select>
            </div>
            <!-- Bold / Italic / Underline / Strike -->
            <div class="rich-toolbar-group">
              <button type="button" class="tb-btn" data-cmd="bold" title="Bold (Ctrl+B)"><i
                  class="fa-solid fa-bold"></i></button>
              <button type="button" class="tb-btn" data-cmd="italic" title="Italic (Ctrl+I)"><i
                  class="fa-solid fa-italic"></i></button>
              <button type="button" class="tb-btn" data-cmd="underline" title="Underline (Ctrl+U)"><i
                  class="fa-solid fa-underline"></i></button>
              <button type="button" class="tb-btn" data-cmd="strikeThrough" title="Strikethrough"><i
                  class="fa-solid fa-strikethrough"></i></button>
            </div>
            <!-- Lists -->
            <div class="rich-toolbar-group">
              <button type="button" class="tb-btn" data-cmd="insertUnorderedList" title="Bullet list"><i
                  class="fa-solid fa-list-ul"></i></button>
              <button type="button" class="tb-btn" data-cmd="insertOrderedList" title="Numbered list"><i
                  class="fa-solid fa-list-ol"></i></button>
            </div>
            <!-- Alignment -->
            <div class="rich-toolbar-group">
              <button type="button" class="tb-btn" data-cmd="justifyLeft" title="Align left"><i
                  class="fa-solid fa-align-left"></i></button>
              <button type="button" class="tb-btn" data-cmd="justifyCenter" title="Center"><i
                  class="fa-solid fa-align-center"></i></button>
              <button type="button" class="tb-btn" data-cmd="justifyRight" title="Align right"><i
                  class="fa-solid fa-align-right"></i></button>
            </div>
            <!-- Indent -->
            <div class="rich-toolbar-group">
              <button type="button" class="tb-btn" data-cmd="outdent" title="Outdent"><i
                  class="fa-solid fa-outdent"></i></button>
              <button type="button" class="tb-btn" data-cmd="indent" title="Indent"><i
                  class="fa-solid fa-indent"></i></button>
            </div>
            <!-- Insert -->
            <div class="rich-toolbar-group">
              <button type="button" class="tb-btn" data-cmd="createLink" title="Insert link"><i
                  class="fa-solid fa-link"></i></button>
              <button type="button" class="tb-btn" data-cmd="unlink" title="Remove link"><i
                  class="fa-solid fa-link-slash"></i></button>
              <button type="button" class="tb-btn" data-cmd="insertImage" title="Insert image URL"><i
                  class="fa-regular fa-image"></i></button>
              <button type="button" class="tb-btn" data-cmd="insertHTML" data-val="<hr>" title="Divider"><i
                  class="fa-solid fa-minus"></i></button>
            </div>
            <!-- Undo/Redo -->
            <div class="rich-toolbar-group">
              <button type="button" class="tb-btn" data-cmd="undo" title="Undo"><i
                  class="fa-solid fa-rotate-left"></i></button>
              <button type="button" class="tb-btn" data-cmd="redo" title="Redo"><i
                  class="fa-solid fa-rotate-right"></i></button>
            </div>
          </div>

          <!-- Editable content area -->
          <div id="rich-editor" role="textbox" aria-multiline="true" aria-label="Post content"></div>

          <div class="editor-footer">
            <span id="word-count">0 words</span>
            <span style="color:var(--clr-text-3)">Ctrl+B bold · Ctrl+I italic · Ctrl+U underline</span>
          </div>
        </div>

        <!-- Excerpt -->
        <div class="card" style="margin-top:var(--sp-4)">
          <div style="margin-bottom:var(--sp-3)">
            <label class="form-label" style="display:flex;justify-content:space-between">
              <span>Excerpt <small style="color:var(--clr-text-3);font-weight:400">(shown on blog
                  listing)</small></span>
              <span id="excerpt-count" style="font-size:.75rem;color:var(--clr-text-3)">0/200</span>
            </label>
            <textarea id="post-excerpt" class="form-control" rows="3"
              placeholder="A short summary of the post shown on the blog listing page…" maxlength="200"></textarea>
          </div>
        </div>

        <!-- SEO -->
        <div class="card" style="margin-top:var(--sp-4)">
          <h4
            style="font-size:.875rem;font-weight:600;margin-bottom:var(--sp-4);display:flex;align-items:center;gap:.5rem">
            <i class="fa-solid fa-magnifying-glass" style="color:var(--clr-gold)"></i> SEO Settings
          </h4>

          <div class="form-group">
            <label class="form-label" style="display:flex;justify-content:space-between">
              <span>SEO Title</span>
              <span id="seo-title-count" style="font-size:.75rem;color:var(--clr-text-3)">0/60</span>
            </label>
            <input type="text" id="post-seo-title" class="form-control" placeholder="Leave blank to use post title"
              maxlength="70">
            <div class="form-hint">Recommended: 50–60 characters</div>
          </div>

          <div class="form-group">
            <label class="form-label" style="display:flex;justify-content:space-between">
              <span>Meta Description</span>
              <span id="seo-desc-count" style="font-size:.75rem;color:var(--clr-text-3)">0/160</span>
            </label>
            <textarea id="post-seo-desc" class="form-control" rows="3" placeholder="Leave blank to use excerpt"
              maxlength="170"></textarea>
            <div class="form-hint">Recommended: 120–160 characters</div>
          </div>

          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">URL Slug</label>
            <div class="input-group">
              <i class="input-icon fa-solid fa-link"></i>
              <input type="text" id="post-slug" class="form-control" placeholder="auto-generated-from-title"
                pattern="[a-z0-9\-]+" title="Lowercase letters, numbers and hyphens only">
            </div>
            <div class="form-hint">blog-post.html?slug=<strong id="slug-preview"
                style="color:var(--clr-gold)">your-slug</strong></div>
          </div>
        </div>
      </div>

      <!-- ── Sidebar ── -->
      <div>
        <!-- Publish status -->
        <div class="sidebar-panel">
          <div class="sidebar-panel-header" id="panel-publish-header">
            <h4><i class="fa-solid fa-circle-dot" style="margin-right:.5rem"></i>Publish</h4>
            <i class="fa-solid fa-chevron-down chevron"></i>
          </div>
          <div class="sidebar-panel-body" id="panel-publish-body">
            <div style="margin-bottom:var(--sp-4)">
              <label style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-3)">
                <span style="font-size:.875rem;font-weight:500">Published</span>
                <label class="toggle">
                  <input type="checkbox" id="post-published">
                  <div class="toggle-track"></div>
                  <div class="toggle-thumb"></div>
                </label>
              </label>
              <label style="display:flex;align-items:center;justify-content:space-between">
                <span style="font-size:.875rem;font-weight:500">Featured post</span>
                <label class="toggle">
                  <input type="checkbox" id="post-featured">
                  <div class="toggle-track"></div>
                  <div class="toggle-thumb"></div>
                </label>
              </label>
            </div>
            <div style="display:flex;flex-direction:column;gap:var(--sp-2)">
              <button type="button" id="save-draft-btn-side" class="btn btn-ghost btn-sm btn-block"
                onclick="document.getElementById('save-draft-btn').click()">
                <i class="fa-regular fa-floppy-disk"></i> Save Draft
              </button>
              <button type="button" id="publish-btn-side" class="btn btn-primary btn-sm btn-block"
                onclick="document.getElementById('publish-btn').click()">
                <i class="fa-solid fa-globe"></i> Publish Now
              </button>
            </div>
          </div>
        </div>

        <!-- Category & Author -->
        <div class="sidebar-panel">
          <div class="sidebar-panel-header" id="panel-meta-header">
            <h4><i class="fa-solid fa-tag" style="margin-right:.5rem"></i>Post Details</h4>
            <i class="fa-solid fa-chevron-down chevron"></i>
          </div>
          <div class="sidebar-panel-body" id="panel-meta-body">
            <div class="form-group">
              <label class="form-label">Category</label>
              <select id="post-category" class="form-control"></select>
            </div>
            <div class="form-group">
              <label class="form-label">Author</label>
              <input type="text" id="post-author" class="form-control" value="ZenMarket Team" placeholder="Author name">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Read Time (minutes)</label>
              <input type="number" id="post-read-time" class="form-control" value="5" min="1" max="60">
            </div>
          </div>
        </div>

        <!-- Tags -->
        <div class="sidebar-panel">
          <div class="sidebar-panel-header" id="panel-tags-header">
            <h4><i class="fa-solid fa-hashtag" style="margin-right:.5rem"></i>Tags</h4>
            <i class="fa-solid fa-chevron-down chevron"></i>
          </div>
          <div class="sidebar-panel-body" id="panel-tags-body">
            <div class="form-group" style="margin-bottom:0">
              <input type="text" id="post-tags" class="form-control" placeholder="spices, ceylon, food">
              <div class="tag-hint">Separate tags with commas</div>
            </div>
          </div>
        </div>

        <!-- Cover Image -->
        <div class="sidebar-panel">
          <div class="sidebar-panel-header" id="panel-cover-header">
            <h4><i class="fa-regular fa-image" style="margin-right:.5rem"></i>Cover Image</h4>
            <i class="fa-solid fa-chevron-down chevron"></i>
          </div>
          <div class="sidebar-panel-body" id="panel-cover-body">
            <div id="cover-preview-wrap">
              <img id="cover-preview-img" alt="Cover preview">
              <div id="cover-preview-empty">
                <i class="fa-regular fa-image"></i>
                No image set
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Image URL</label>
              <input type="url" id="post-cover" class="form-control" placeholder="https://example.com/image.jpg">
            </div>
            <button type="button" id="cover-upload-btn" class="btn btn-ghost btn-sm btn-block">
              <i class="fa-solid fa-upload"></i> Upload from device
            </button>
          </div>
        </div>
      </div>
    </div>
  </form>



<script type="module" src="../js/admin/admin-blog-edit.js"></script>
  <script src="../js/pages/admin-blog-edit.js"></script>
</body>

</html>
